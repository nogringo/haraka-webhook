[main]
strict_rfc1869=false
postel=false
smtputf8=true

[haproxy]
enabled=true
hosts[] =

[headers]
max_lines=1000
max_received=100

[max]
bytes=26214400
mime_parts=1000
line_length=512
data_line_length=992

[message]
greeting[]=mail service ready
helo=SMTP service ready.
close=closing connection. Have a jolly good day.

[uuid]
banner_chars=6
deny_chars=0
