services:
  haraka-webhook:
    image: ghcr.io/nogringo/haraka-webhook:latest
    env_file:
      - path: .env
        required: false
    ports:
      - "25:25/tcp"
    volumes:
      - haraka-spool:/var/spool/haraka-webhook
      # TLS certs, read-only. Defaults to ./certs; point SMTP_TLS_CERT_DIR
      # elsewhere (e.g. Caddy's cert storage) in .env, then set
      # SMTP_TLS_CERT_PATH and SMTP_TLS_KEY_PATH to the files inside /certs.
      - ${SMTP_TLS_CERT_DIR:-./certs}:/certs:ro
    restart: unless-stopped

volumes:
  haraka-spool:
